<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ article.title }} - PCB GEO 知识库</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fff;
            padding-top: 20px;
        }

        .article-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            background: #fff;
        }

        table {
            width: 100%;
            margin-bottom: 1rem;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #dee2e6;
            padding: 0.75rem;
        }

        th {
            background-color: #f8f9fa;
        }

        blockquote {
            border-left: 4px solid #0d6efd;
            padding-left: 1rem;
            color: #6c757d;
        }

        .badge-fingerprint {
            background-color: #ffc107;
            color: #000;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="btn btn-outline-secondary mb-3">← 返回仪表盘</a>

        <div class="article-container">
            <h1 class="mb-4">{{ article.title }}</h1>

            <div class="mb-4 text-muted small">
                <span>Slug: {{ article.slug }}</span> |
                <span>发布时间: {{ article.created_at }}</span> |
                <span>质量分: {{ article.quality_score }}</span>
            </div>

            <div class="content">
                {{ content | safe }}
            </div>
        </div>
    </div>

    <script>
        // 简单的高亮脚本: 尝试高亮并在控制台输出指纹 (如果已知)
        document.addEventListener("DOMContentLoaded", function () {
            // 可以在这里添加前端指纹高亮逻辑
        });
    </script>
</body>

</html>
